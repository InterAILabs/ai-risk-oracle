name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Build, test, and verify package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Check contracts
        run: npm run contracts

      - name: Check tracked secrets
        run: npm run secrets:check

      - name: Check Python SDK
        run: npm run python:sdk

      - name: Check package contents
        run: npm run package:check
